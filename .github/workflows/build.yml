name: Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - run: npm install
    - run: npm run build
    - run: npx electron-builder --win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
